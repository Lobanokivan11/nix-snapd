name: "Publish every Git push to main to FlakeHub"
on:
  push:
    branches:
      - "main"
  workflow_dispatch:
jobs:
  flakehub-publish:
    runs-on: "ubuntu-latest"
    permissions:
      id-token: "write"
      contents: "read"
    steps:
      - uses: "actions/checkout@v3"
      - uses: "DeterminateSystems/nix-installer-action@main"
        with:
          flakehub-token: ${{ secrets.FLAKEHUB_TOKEN }}
      - uses: "DeterminateSystems/flakehub-push@main"
        with:
          name: "Lobanokivan11/nix-snapd"
          rolling: true
          flakehub-token: ${{ secrets.FLAKEHUB_TOKEN }}
          visibility: "public"
